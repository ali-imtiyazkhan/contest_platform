services:
  # Main Backend API + Combined Workers (to stay on Free tier)
  - type: web
    name: devforces-backend
    runtime: node
    plan: free # Use the free tier
    buildCommand: bun install && bun x turbo run generate --filter=db && bun x turbo run build --filter=backend
    # We run the API and both workers in the same service to save costs
    startCommand: bun run apps/backend/index.ts & bun run apps/backend/workers/judgeWorker.ts & bun run apps/backend/workers/aiWorker.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: devforces-db
          property: connectionString
      - key: REDIS_URL # You will need to provide an external Redis URL (like Upstash) for 100% free
        sync: false
      - key: PORT
        value: 4000
      - key: USER_JWT_PASSWORD
        sync: false
      - key: EMAIL_JWT_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: GEMINI_API_KEY
        sync: false

# Managed Database (Free for 90 days)
databases:
  - name: devforces-db
    databaseName: contest_db
    plan: free
