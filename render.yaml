services:
  # 1. Main Backend API
  - type: web
    name: devforces-backend
    runtime: node
    buildCommand: bun install && bun x turbo run build --filter=db && bun x turbo run build --filter=backend
    startCommand: bun run apps/backend/index.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: devforces-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: redis
          name: devforces-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: devforces-redis
          property: port
      - key: PORT
        value: 4000
      - key: USER_JWT_PASSWORD
        sync: false
      - key: EMAIL_JWT_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # 2. Judge Worker
  - type: worker
    name: devforces-judge-worker
    runtime: node
    buildCommand: bun install && bun x turbo run build --filter=db && bun x turbo run build --filter=backend
    startCommand: bun run apps/backend/workers/judgeWorker.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: devforces-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: redis
          name: devforces-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: devforces-redis
          property: port
      - key: USER_JWT_PASSWORD
        sync: false
      - key: EMAIL_JWT_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

  # 3. AI Worker
  - type: worker
    name: devforces-ai-worker
    runtime: node
    buildCommand: bun install && bun x turbo run build --filter=db && bun x turbo run build --filter=backend
    startCommand: bun run apps/backend/workers/aiWorker.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: devforces-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: redis
          name: devforces-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: devforces-redis
          property: port
      - key: USER_JWT_PASSWORD
        sync: false
      - key: EMAIL_JWT_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: GEMINI_API_KEY
        sync: false

# Managed Database
databases:
  - name: devforces-db
    databaseName: contest_db
    user: postgres

# Managed Redis
redis:
  - name: devforces-redis
    ipAllowList: [] # Only allow internal connections
